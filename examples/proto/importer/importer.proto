// importer.proto references messages from other packages to verify that
// protoc-gen-go-const correctly emits cross-package imports for:
//   * a message from a NON-excluded in-repo package (uses its *_Const
//     interface),
//   * a message from an excluded in-repo package (keeps the concrete
//     *External and does not call AsConst on it), and
//   * a message from a well-known-type package (google.protobuf.Timestamp)
//     whose Go package is excluded *automatically* by the plugin: the
//     well-known-types subtree (`google.golang.org/protobuf/types/known/**`)
//     is a built-in default exclude, so users do not need to list it in
//     --exclude_packages. WKTs are therefore treated as "concrete pointer,
//     no AsConst" in singular / repeated / map positions out of the box —
//     these fields exist precisely to pin that contract at the Go type
//     level via importer/importer_const_test.go.
syntax = "proto3";

package importer;

import "google/protobuf/timestamp.proto";
import "external/external.proto";
import "nested/nested.proto";

message Envelope {
  string id = 1;
  nested.Address addr = 2;                    // always gets Address_Const
  external.External ext = 3;                  // keeps *External when excluded
  repeated external.External extras = 4;      // list of excluded-type messages
  map<string, external.External> ext_map = 5; // map of excluded-type values

  // WKT (google.protobuf.Timestamp): excluded by the plugin's built-in
  // default, so references keep the concrete *timestamppb.Timestamp.
  google.protobuf.Timestamp created_at = 6;
  repeated google.protobuf.Timestamp history = 7;
  map<string, google.protobuf.Timestamp> ts_map = 8;
}
