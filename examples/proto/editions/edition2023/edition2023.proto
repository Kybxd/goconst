// edition2023.proto validates protoc-gen-go-const on Protobuf Edition
// 2023, the first stable edition. It exercises the feature settings
// that materially change field presence / enum semantics:
//
//   features.field_presence = EXPLICIT         (proto2-like, *T in Go)
//   features.field_presence = IMPLICIT         (proto3-like, zero-value)
//   features.field_presence = LEGACY_REQUIRED  (proto2 required)
//   features.enum_type      = CLOSED           (proto2-closed enum)
//
// The const layer is presence-agnostic (it only forwards Get* getters),
// so these settings primarily stress that the generator still produces
// correct, compiling Go — which is the point of this example.
edition = "2023";

package editions.edition2023;
// Directory-matches-package convention: this file lives at
// proto/editions/edition2023/, matching its proto package name.

// File-level default: EXPLICIT presence (proto2-like, *T in Go for
// scalars). Individual fields below override this where needed.
option features.field_presence = EXPLICIT;

// Color defaults to open enum semantics under edition 2023; we pin it
// to CLOSED to match proto2 behaviour and exercise that code path.
enum Color {
  option features.enum_type = CLOSED;

  COLOR_UNSPECIFIED = 0;
  COLOR_RED = 1;
  COLOR_GREEN = 2;
  COLOR_BLUE = 3;
}

// Tag is reused as repeated / map value element to cover message
// recursion under edition 2023.
message Tag {
  string key = 1;
  string value = 2;
}

// Person exercises every presence flavour on scalars + a nested
// message + repeated message + map-with-message-value + a CLOSED
// enum field.
message Person {
  string name = 1; // EXPLICIT (file default)
  int32 age = 2 [ features.field_presence = IMPLICIT ]; // proto3-like
  string id = 3
      [ features.field_presence = LEGACY_REQUIRED ]; // proto2 required
  Color fav_color = 4;                               // CLOSED enum, EXPLICIT

  Tag home_tag = 5;            // singular nested message
  repeated Tag tags = 6;       // repeated message
  map<string, Tag> labels = 7; // map<scalar, message>
}
