// scalar.proto exercises every proto3 scalar kind plus proto3 `optional`
// so the generated *_Const interface should contain matching Get* methods
// whose return types exactly mirror the concrete message.
syntax = "proto3";

package testdata.scalar;

// Color is a simple enum used to verify enum field handling.
enum Color {
  COLOR_UNSPECIFIED = 0;
  COLOR_RED = 1;
  COLOR_GREEN = 2;
  COLOR_BLUE = 3;
}

// AllScalars covers every scalar kind supported by protoreflect.
message AllScalars {
  bool f_bool = 1;
  int32 f_int32 = 2;
  sint32 f_sint32 = 3;
  sfixed32 f_sfixed32 = 4;
  uint32 f_uint32 = 5;
  fixed32 f_fixed32 = 6;
  int64 f_int64 = 7;
  sint64 f_sint64 = 8;
  sfixed64 f_sfixed64 = 9;
  uint64 f_uint64 = 10;
  fixed64 f_fixed64 = 11;
  float f_float = 12;
  double f_double = 13;
  string f_string = 14;
  bytes f_bytes = 15;
  Color f_enum = 16;

  // proto3 explicit presence (optional) should still produce an unchanged
  // Get* signature on the _Const interface.
  optional string f_optional_string = 17;
  optional int32 f_optional_int32 = 18;
  optional Color f_optional_enum = 19;
}
